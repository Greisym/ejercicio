<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <h1>✨ Gestión de Inventario (API)</h1>

    <div class="form-container">
        <h3>Agregar Nuevo Producto</h3>
        <input type="text" id="referencia" placeholder="Referencia (ej: SKU-01)">
        <input type="text" id="nombre" placeholder="Nombre del Producto">
        <input type="number" id="precio" placeholder="Precio ($)">
        <input type="number" id="stock" placeholder="Stock Cantidad">
        
        <label for="estado"> Estado: </label>
        <select id="estado">
            <option value="true">Activo</option>
            <option value="false">Inactivo</option>
        </select>

        <button class="btn-save" onclick="crearProducto()">Guardar en API</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Referencia</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaProductos">
            </tbody>
    </table>

    <script src="ej1.js"></script>
</body>
</html>
